[profile.default]
# Terminate hung tests at 2x5s. The suite runs in milliseconds, so any test
# this slow is hanging. Must stay under cargo-mutants' 20s minimum timeout so
# infinite-loop mutants fail the suite (caught) rather than time out; see
# .cargo/mutants.toml.
slow-timeout = { period = "5s", terminate-after = 2 }
