[profile.default]
# Terminate hung tests at 2x10s. The suite runs in milliseconds, so any test
# this slow is hanging; the wide margin keeps contended machines (parallel
# builds alongside the run) from killing healthy tests. Must stay under
# cargo-mutants' minimum_test_timeout (30s, .cargo/mutants.toml) so
# infinite-loop mutants fail the suite (caught) rather than time out.
slow-timeout = { period = "10s", terminate-after = 2 }
