name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  # `@semantic-release/github`'s success step comments on the issues and
  # PRs closed by the release; without these scopes that API call returns
  # "Resource not accessible by integration" and the step fails after the
  # release has already published.
  issues: write
  pull-requests: write

# Serialize releases so two runs cannot race on the tag push;
# `cancel-in-progress: false` lets an in-flight release finish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_KEY }}
        # semantic-release's prepare step runs `just semver-check` (cargo +stable
        # semver-checks) against the freshly bumped version, so stable must be
        # installed in the same nix-shell env before release runs.
        run: nix-shell shell.nix --run 'rustup toolchain install stable --profile minimal && just release'
