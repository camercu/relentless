name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_KEY }}
        # semantic-release's prepare step runs `just semver-check` (cargo +stable
        # semver-checks) against the freshly bumped version, so stable must be
        # installed in the same nix-shell env before release runs.
        run: nix-shell shell.nix --run 'rustup toolchain install stable --profile minimal && just release'
