name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  canonical-gate:
    name: Canonical gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: just ci
        run: nix-shell --run 'just ci'

  stable-advisory:
    name: Latest stable advisory
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
          components: clippy
      - uses: taiki-e/install-action@87026687851535188a2e3e5ac8af4f68b8470b34 # v2.67.22
        with:
          tool: just
      - name: just ci-stable
        run: just ci-stable

  feature-compat:
    name: Feature compatibility (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - jitter
          - serde
          - jitter,serde
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: "1.85.0"
      - name: cargo test feature_compat
        run: cargo test --test feature_compat --features "${{ matrix.features }}"

  runtime-sleep-features:
    name: Runtime sleep features (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - tokio-sleep
          - futures-timer-sleep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: "1.85.0"
      - name: cargo test policy_async
        run: cargo test --test policy_async --features "${{ matrix.features }}"

  embassy-sleep-compile:
    name: Embassy sleep compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: "1.85.0"
      - name: cargo check embassy-sleep
        run: cargo check --features embassy-sleep

  allocation-profile:
    name: Allocation profile (single-thread)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: "1.85.0"
      - name: cargo test allocation_hot_paths
        run: cargo test --test allocation_hot_paths -- --test-threads=1

  alloc-compat:
    name: alloc-only compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: "1.85.0"
      - name: cargo check --no-default-features --features alloc
        run: cargo check --no-default-features --features alloc

  msrv:
    name: MSRV 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: "1.85.0"
      - name: cargo check
        run: cargo check --all-targets
      - name: cargo test
        run: cargo test --all-targets
