name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  canonical-gate:
    name: Canonical gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: just ci
        run: nix-shell --run 'just ci'

  stable-advisory:
    name: Latest stable advisory
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: just ci-stable
        run: just ci-stable

  feature-compat:
    name: Feature compatibility (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - jitter
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - name: cargo test feature_compat
        run: cargo test --test feature_compat --features "${{ matrix.features }}"

  runtime-sleep-features:
    name: Runtime sleep features (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - tokio-sleep
          - futures-timer-sleep
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - name: cargo test policy_async
        run: cargo test --test policy_async --features "${{ matrix.features }}"

  embassy-sleep-compile:
    name: Embassy sleep compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - name: cargo check embassy-sleep
        run: cargo check --features embassy-sleep

  allocation-profile:
    name: Allocation profile (single-thread)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - name: cargo test allocation_hot_paths
        run: cargo test --test allocation_hot_paths -- --test-threads=1

  alloc-compat:
    name: alloc-only compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - name: cargo check --no-default-features --features alloc
        run: cargo check --no-default-features --features alloc

  msrv:
    name: MSRV 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - name: cargo check
        run: cargo check --all-targets
      - name: cargo test
        run: cargo test --all-targets
