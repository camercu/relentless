name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all --check

  test-and-lint:
    name: Test + clippy (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
          components: clippy
      - name: cargo test
        run: cargo test --all-targets
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo bench --no-run
        run: cargo bench --bench retry_hot_paths --no-run

  feature-compat:
    name: Feature compatibility (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - jitter
          - serde
          - jitter,serde
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
      - name: cargo test feature_compat
        run: cargo test --test feature_compat --features ${{ matrix.features }}

  runtime-sleep-features:
    name: Runtime sleep features (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - tokio-sleep
          - futures-timer-sleep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
      - name: cargo test async_execution
        run: cargo test --test async_execution --features ${{ matrix.features }}

  embassy-sleep-compile:
    name: Embassy sleep compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
      - name: cargo check embassy-sleep
        run: cargo check --features embassy-sleep

  allocation-profile:
    name: Allocation profile (single-thread)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
      - name: cargo test allocation_hot_paths
        run: cargo test --test allocation_hot_paths -- --test-threads=1

  docs:
    name: Docs lint
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
      - name: cargo test --doc
        run: cargo test --doc
      - name: cargo doc
        run: cargo doc --all-features --no-deps

  cargo-deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
      - uses: taiki-e/install-action@87026687851535188a2e3e5ac8af4f68b8470b34 # v2.67.22
      - name: cargo deny
        run: cargo deny check advisories licenses bans sources

  msrv:
    name: MSRV 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: "1.85.0"
      - name: cargo check
        run: cargo check --all-targets
      - name: cargo test
        run: cargo test --all-targets

  no-default-feature-tests:
    name: no-default-features test path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
      - name: cargo test --no-default-features
        run: cargo test --no-default-features
      - name: cargo check --no-default-features --features alloc
        run: cargo check --no-default-features --features alloc

  no-std-thumb:
    name: no_std thumbv7m
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
          targets: thumbv7m-none-eabi
      - name: build no-default-features for thumbv7m
        run: cargo build --target thumbv7m-none-eabi --no-default-features

  no-std-wasm:
    name: wasm32 no_std compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@efa25f7f0596c5e57a3425100840d6b4182ed01a
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: check no-default-features + alloc + gloo
        run: cargo check --target wasm32-unknown-unknown --no-default-features --features alloc,gloo-timers-sleep
