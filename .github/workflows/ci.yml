name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  canonical-gate:
    name: Canonical gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}
          targets: thumbv7m-none-eabi,wasm32-unknown-unknown
          components: clippy,rustfmt
      - name: Install MSRV toolchain
        run: |
          msrv=$(cargo metadata --format-version 1 --no-deps | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['rust_version'])")
          if [ "$msrv" != "${{ steps.tools.outputs.rust }}" ]; then
            rustup toolchain install "$msrv" --profile minimal
          fi
      - name: Install stable toolchain (for semver-checks)
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just@${{ steps.tools.outputs.just }},cargo-deny@${{ steps.tools.outputs.cargo_deny }},cargo-nextest@${{ steps.tools.outputs.cargo_nextest }},typos-cli@${{ steps.tools.outputs.typos_cli }},taplo-cli@${{ steps.tools.outputs.taplo_cli }},cargo-semver-checks@${{ steps.tools.outputs.cargo_semver_checks }},cargo-llvm-cov@${{ steps.tools.outputs.cargo_llvm_cov }}
      # `just lint` runs markdownlint-cli2 (npm) and actionlint (a Go binary),
      # which the cargo-centric install-action above can't provide. Locally
      # they come from nix-shell; here from npm and the pinned release tarball.
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
      - name: Install markdownlint-cli2
        env:
          # Via the environment, not `${{ }}` inlined into the shell, so a
          # crafted .tool-versions cannot inject into the install command.
          MDL_VERSION: ${{ steps.tools.outputs.markdownlint_cli2 }}
        run: npm install -g "markdownlint-cli2@${MDL_VERSION}"
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: ${{ steps.tools.outputs.actionlint }}
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" actionlint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: just ci
        run: just ci

  stable-advisory:
    name: Latest stable advisory
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest
      - name: just ci-stable
        run: just ci-stable

  # Mutation-tests only the code changed by this push/PR: fast gate that
  # changed code arrives with tests that kill its mutants.
  mutants-diff:
    name: Mutants (diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Parse .tool-versions
        id: tools
        run: |
          while read -r name version; do
            echo "${name//-/_}=${version}" >> "$GITHUB_OUTPUT"
          done < <(grep -v '^#' .tool-versions | grep -v '^$')
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.tools.outputs.rust }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just@${{ steps.tools.outputs.just }},cargo-nextest@${{ steps.tools.outputs.cargo_nextest }},cargo-mutants@${{ steps.tools.outputs.cargo_mutants }}
      - name: just mutants-diff
        env:
          # Pass repository-controlled context through the environment
          # instead of interpolating `${{ }}` straight into the shell,
          # which would let a crafted branch/ref name inject commands.
          # `github.event.before` is all-zeroes on the first push to a new
          # branch and orphaned after a force-push; fall back to the parent.
          PR_BASE: origin/${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="$PR_BASE"
          elif [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ] \
              || ! git cat-file -e "${PUSH_BEFORE}^{commit}" 2>/dev/null; then
            base=HEAD~1
          else
            base="$PUSH_BEFORE"
          fi
          just mutants-diff "$base"

  commitlint:
    # Enforce Conventional Commits in CI, not only via the local commit-msg
    # hook (which a --no-verify bypass or a non-nix contributor can skip).
    # Runs on push too, so direct-to-main commits are linted regardless of
    # merge path.
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Lint commits against Conventional Commits
        env:
          # Repository-controlled context via the environment, never inlined
          # into the shell. `github.event.before` is all-zeroes on the first
          # push to a new branch and orphaned after a force-push; fall back to
          # linting just the most-recent commit.
          PR_BASE: origin/${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx --no-install commitlint --from "$PR_BASE" --to HEAD --verbose
          elif [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ] \
              || ! git cat-file -e "${PUSH_BEFORE}^{commit}" 2>/dev/null; then
            npx --no-install commitlint --last --verbose
          else
            npx --no-install commitlint --from "$PUSH_BEFORE" --to "$PUSH_AFTER" --verbose
          fi
