# Run the test suite under nextest so its slow-timeout (.config/nextest.toml)
# kills hung tests before cargo-mutants' own timeout fires. Infinite-loop
# mutants (e.g. `should_stop -> false`) then fail the suite and are counted
# as caught instead of as timeouts.
test_tool = "nextest"

# Keep cargo-mutants' own timeout above nextest's 2x10s kill (20s) so nextest
# always fires first; without this the default minimum is exactly 20s — a race.
minimum_test_timeout = 30

# Compile every host-testable feature-gated module into each run; without its
# feature a module sits in cfg'd-out code where mutants compile identically to
# baseline and trivially survive as false "missed". Covers the sleep adapters
# and `test-util` (VirtualClock). (`gloo-timers-sleep` is wasm-only and stays
# uncoverable on the host.)
additional_cargo_args = ["--features", "tokio-sleep,embassy-sleep,futures-timer-sleep,test-util"]

# `debug_assert_timeout_has_clock` guards a no_std-only hazard (SPEC 11.2:
# timeout without a clock silently no-ops). This harness runs with `std`, where
# `ElapsedTracker::start` always installs a fallback `Instant` clock, so the
# asserted condition is unconditionally true and the mutant that empties the
# assertion cannot be killed here. The assertion IS covered by
# `timeout_without_clock_panics_in_debug`, which runs under
# `--no-default-features`. Exclude the unkillable-under-std mutant rather than
# leave a permanent false "missed".
exclude_re = ["replace debug_assert_timeout_has_clock"]
